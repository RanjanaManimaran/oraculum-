<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&family=Dancing+Script:wght@400;700&family=Nunito:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;color:#ccc;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;user-select:none;padding:14px;background:#0a0a0a}
#bgCanvas{position:fixed;inset:0;z-index:-1;width:100%;height:100%}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.55) 100%);opacity:.8}
#themeScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;position:fixed;inset:0;z-index:100;background:rgba(8,6,14,.95);backdrop-filter:blur(10px);transition:opacity .6s;padding:16px}
#themeScreen.exit{opacity:0;pointer-events:none}
.ts-title{font-family:'Cinzel',serif;font-size:1.3em;font-weight:700;letter-spacing:4px;color:#c9a227;text-transform:uppercase;margin-bottom:4px}
.ts-orn{display:none}
.ts-sub{color:rgba(255,255,255,.3);font-size:.72em;margin-bottom:18px}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px}
.theme-card{border-radius:12px;padding:16px 10px 12px;text-align:center;cursor:pointer;transition:all .3s;border:1px solid rgba(255,255,255,.05)}
.theme-card:hover{transform:translateY(-2px)}
.tc-icon{font-size:1.4em;margin-bottom:4px;display:block}
.tc-name{font-size:.7em;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.tc-desc{font-size:.52em;opacity:.35;font-style:italic;line-height:1.3}
.tc-space{background:rgba(80,60,180,.06)}.tc-space .tc-icon{color:#7a6ae0}.tc-space .tc-name{color:#b0a8f0;font-family:'Space Mono',monospace}
.tc-space:hover{background:rgba(80,60,180,.12);box-shadow:0 3px 16px rgba(80,60,180,.1)}
.tc-ancient{background:rgba(184,149,42,.06)}.tc-ancient .tc-icon{color:#b8952a}.tc-ancient .tc-name{color:#d4c4a0;font-family:'Cinzel',serif}
.tc-ancient:hover{background:rgba(184,149,42,.12);box-shadow:0 3px 16px rgba(184,149,42,.1)}
.tc-love{background:rgba(200,80,120,.06)}.tc-love .tc-icon{color:#e07090}.tc-love .tc-name{color:#f0b8c8;font-family:'Dancing Script',cursive}
.tc-love:hover{background:rgba(200,80,120,.12);box-shadow:0 3px 16px rgba(200,80,120,.1)}
.tc-nature{background:rgba(50,140,70,.06)}.tc-nature .tc-icon{color:#50aa60}.tc-nature .tc-name{color:#a0d8a8;font-family:'Nunito',sans-serif}
.tc-nature:hover{background:rgba(50,140,70,.12);box-shadow:0 3px 16px rgba(50,140,70,.1)}
#gameArea{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;position:relative;z-index:1}
#streak{position:fixed;top:10px;left:10px;z-index:99;font-size:.55em;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);padding:3px 8px;border-radius:6px;display:none;font-weight:600;letter-spacing:1px;text-transform:uppercase;backdrop-filter:blur(6px)}
#themeLabel{position:fixed;top:10px;right:10px;z-index:99;font-size:.5em;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);padding:3px 8px;border-radius:6px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;backdrop-filter:blur(6px)}
.header{text-align:center;margin-bottom:5px}
.gtitle{font-size:1.25em;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.title-orn{display:none}
.gsubtitle{font-size:.6em;letter-spacing:1px;opacity:.25;margin-top:2px}
#status{font-size:.75em;opacity:.5;margin-bottom:3px;text-align:center;min-height:18px;font-style:italic}
#letterDisp{font-size:1.05em;font-weight:700;min-height:22px;letter-spacing:6px;text-align:center;margin-bottom:1px}
#ft-container{position:relative;width:210px;height:210px;margin:3px 0 8px;transition:opacity .6s,transform .6s}
#ft-container.disappear{opacity:0;transform:scale(.8) rotateX(18deg);pointer-events:none}
#ft-base svg{width:100%;height:100%;display:block}
.tri{transition:fill .2s;stroke:rgba(255,255,255,.04);stroke-width:.3}
.tri-idle{stroke:rgba(255,255,255,.04)!important}
.tri.clickable{cursor:pointer}.tri.clickable:hover{filter:brightness(1.25)}
#label-layer{position:absolute;inset:0;z-index:10;pointer-events:none}
.fl{position:absolute;font-weight:700;font-size:11px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8),0 0 6px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;white-space:nowrap}
.fl.clk{pointer-events:auto;cursor:pointer}
.fl0{top:10%;left:50%;transform:translateX(-50%);width:80px;height:26px}
.fl1{top:50%;right:2%;transform:translateY(-50%);width:80px;height:26px}
.fl2{bottom:10%;left:50%;transform:translateX(-50%);width:80px;height:26px}
.fl3{top:50%;left:2%;transform:translateY(-50%);width:80px;height:26px}
#introOverlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s;z-index:12;pointer-events:none}
#introOverlay.hide{opacity:0}
.intro-sym{font-size:1.3em;animation:gP 4s ease-in-out infinite;letter-spacing:4px}
@keyframes gP{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}
.intro-hint{font-size:.5em;opacity:.28;margin-top:6px;font-style:italic}
#ft-border{position:absolute;inset:-7px;border:1px solid rgba(255,255,255,.03);border-radius:3px;pointer-events:none}
#fold-overlay{position:absolute;inset:0;pointer-events:none;z-index:5}
.ff{position:absolute;inset:0;transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .38s;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.02)}
.ff-t{clip-path:polygon(50% 50%,0 0,100% 0);transform-origin:50% 100%}
.ff-r{clip-path:polygon(50% 50%,100% 0,100% 100%);transform-origin:0% 50%}
.ff-b{clip-path:polygon(50% 50%,100% 100%,0 100%);transform-origin:50% 0%}
.ff-l{clip-path:polygon(50% 50%,0 100%,0 0);transform-origin:100% 50%}
.fh .ff-t{transform:scaleY(.04);opacity:.05}.fh .ff-b{transform:scaleY(.04);opacity:.05}
.fh .ff-l,.fh .ff-r{transform:scale(1);opacity:.5}
.fv .ff-l{transform:scaleX(.04);opacity:.05}.fv .ff-r{transform:scaleX(.04);opacity:.05}
.fv .ff-t,.fv .ff-b{transform:scale(1);opacity:.5}
.fc .ff{transform:scale(1);opacity:.28}
.cdot{position:absolute;top:50%;left:50%;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.03);transform:translate(-50%,-50%);z-index:6}
.btn{padding:9px 22px;border:none;border-radius:6px;font-size:.72em;font-weight:600;cursor:pointer;transition:all .25s;outline:none;margin:3px;letter-spacing:1.2px;text-transform:uppercase}
.btn-stop{background:rgba(200,60,60,.08);color:#c05050;border:1px solid rgba(200,60,60,.1);animation:ps 2s ease-in-out infinite}
@keyframes ps{0%,100%{box-shadow:0 0 0 0 rgba(200,60,60,.08)}50%{box-shadow:0 0 0 4px rgba(200,60,60,0)}}
#controls{min-height:36px;display:flex;align-items:center;justify-content:center}.hidden{display:none!important}
#rev-ov{display:none;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.5);opacity:0;transition:opacity .4s;align-items:center;justify-content:center;flex-direction:column}
#rev-ov.show{opacity:1}
#rev-cv{width:160px;height:160px}
#rev-tx{font-size:.68em;text-align:center;font-weight:600;margin-top:6px;min-height:16px;letter-spacing:1.5px}
#f-scene{display:none;position:fixed;inset:0;z-index:50;flex-direction:column;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .6s}
#f-scene.show{display:flex;opacity:1}
#f-scene::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.7);pointer-events:none}
.sb{position:relative;width:100%;max-width:360px;animation:si 1s .15s cubic-bezier(.22,1,.36,1) both;z-index:1}
@keyframes si{from{opacity:0;transform:translateY(35px) scale(.93)}to{opacity:1;transform:translateY(0) scale(1)}}
.sp{position:relative;background:rgba(0,0,0,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:26px 22px 22px;text-align:center;overflow:hidden}
.sg{display:none}
.fs{font-size:1em;margin-bottom:6px;position:relative;letter-spacing:4px;opacity:.6}
.fc2{font-size:.58em;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;position:relative;opacity:.4}
.fq{font-size:1.05em;line-height:1.75;font-weight:400;font-style:italic;position:relative;max-width:300px;margin:0 auto;word-wrap:break-word;overflow-wrap:break-word}
.fd{width:30px;height:1px;margin:14px auto;opacity:.15;position:relative}
.fm{font-size:.5em;opacity:.28;letter-spacing:1.5px;text-transform:uppercase;position:relative}
.fsr{font-size:.58em;margin-top:5px;font-style:italic;position:relative;opacity:.3}
.sa{display:flex;gap:10px;justify-content:center;margin-top:18px;position:relative}
.bs{padding:8px 16px;border:1px solid rgba(255,255,255,.1);border-radius:6px;background:rgba(255,255,255,.06);font-size:.62em;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:1.2px;text-transform:uppercase}
.bs:hover{border-color:rgba(255,255,255,.25)}.bs.pr:hover{opacity:.9}
.ld{display:inline-flex;gap:4px;align-items:center;height:24px;justify-content:center}
.ld span{width:5px;height:5px;border-radius:50%;animation:lb .7s ease-in-out infinite alternate}
.ld span:nth-child(2){animation-delay:.18s}.ld span:nth-child(3){animation-delay:.36s}
@keyframes lb{to{opacity:.12;transform:translateY(-5px)}}
.cf{position:fixed;pointer-events:none;z-index:60;animation:cff var(--dur) ease-out forwards}
@keyframes cff{0%{opacity:.6;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(var(--dy)) translateX(var(--dx)) rotate(var(--rot)) scale(0)}}
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.06);padding:5px 12px;border-radius:6px;font-size:.58em;opacity:0;transition:all .3s;z-index:70;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#playerCount{position:fixed;bottom:10px;right:10px;z-index:99;font-family:'Cinzel',serif;font-size:.5em;color:rgba(255,255,255,.25);background:rgba(0,0,0,.25);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.04);padding:4px 10px;border-radius:6px}

/* Tap ripple */
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.08);transform:scale(0);animation:rippleAnim .6s ease-out forwards;pointer-events:none;z-index:20}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}



/* Splash screen */
#splash{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#08060e;transition:opacity .8s}
#splash.exit{opacity:0;pointer-events:none}
.splash-title{font-family:'Cinzel',serif;font-size:2em;font-weight:700;letter-spacing:6px;color:#c9a227;text-transform:uppercase;opacity:0;animation:splashIn 1s .3s ease-out forwards}
.splash-line{width:60px;height:1px;background:rgba(201,162,39,.2);margin:8px 0;opacity:0;animation:splashIn .8s .6s ease-out forwards}
.splash-sub{font-family:'Cormorant Garamond',serif;font-size:.8em;color:rgba(255,255,255,.25);font-style:italic;letter-spacing:2px;opacity:0;animation:splashIn .8s .9s ease-out forwards}
.splash-ver{font-size:.5em;color:rgba(255,255,255,.1);margin-top:20px;letter-spacing:1px;opacity:0;animation:splashIn .6s 1.2s ease-out forwards}
@keyframes splashIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>

<canvas id="bgCanvas"></canvas>

<!-- Splash intro -->
<div id="splash">
  <div class="splash-title">Oraculum</div>
  <div class="splash-line"></div>
  <div class="splash-sub">the paper fortune teller game</div>
</div>



<div id="themeScreen" style="display:none">
  <div class="ts-title">Oraculum</div><div class="ts-orn">· · ✦ · ·</div><div class="ts-sub">choose your realm</div>
  <div class="theme-grid">
    <div class="theme-card tc-space" onclick="selectTheme('space')"><span class="tc-icon">✧</span><div class="tc-name">Space</div><div class="tc-desc">Nebulae, stardust, cosmic transmissions</div></div>
    <div class="theme-card tc-ancient" onclick="selectTheme('ancient')"><span class="tc-icon">⟐</span><div class="tc-name">Ancient</div><div class="tc-desc">Sacred temples, scrolls, buried wisdom</div></div>
    <div class="theme-card tc-love" onclick="selectTheme('love')"><span class="tc-icon">♡</span><div class="tc-name">Love</div><div class="tc-desc">Hearts, confessions, soulmates</div></div>
    <div class="theme-card tc-nature" onclick="selectTheme('nature')"><span class="tc-icon">❋</span><div class="tc-name">Nature</div><div class="tc-desc">Forests, mountains, rivers, wild earth</div></div>
  </div>
</div>

<div id="gameArea">
  <div id="streak"></div><div id="themeLabel" onclick="goThemeSelect()"></div>
  <div class="header"><div class="gtitle" id="gT"></div><div class="title-orn" id="gO"></div><div class="gsubtitle" id="gS"></div></div>
  <div id="status"></div><div id="letterDisp"></div>
  <div id="ft-container">
    <div id="ft-border"></div>
    <div id="ft-base"><svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg">
      <polygon id="p0" class="tri tri-idle" points="105,105 0,0 210,0"/>
      <polygon id="p1" class="tri tri-idle" points="105,105 210,0 210,210"/>
      <polygon id="p2" class="tri tri-idle" points="105,105 210,210 0,210"/>
      <polygon id="p3" class="tri tri-idle" points="105,105 0,210 0,0"/>
    </svg></div>
    <div id="label-layer"><div class="fl fl0" id="lb0"></div><div class="fl fl1" id="lb1"></div><div class="fl fl2" id="lb2"></div><div class="fl fl3" id="lb3"></div></div>
    <div id="introOverlay"><div class="intro-sym" id="iSym"></div><div class="intro-hint" id="iHint"></div></div>
    <div id="fold-overlay" class="fc"><div class="ff ff-t"></div><div class="ff ff-r"></div><div class="ff ff-b"></div><div class="ff ff-l"></div></div>

<div id="f-scene"><div class="sb"><div class="sp"><div class="sg"></div>
  <div class="fs" id="fSy"></div><div class="fc2" id="fCa"></div><div class="fq" id="fQ"></div>
  <div class="fd" id="fDv"></div><div class="fm" id="fM"></div><div class="fsr" id="fSr"></div>

</div></div></div>
<div id="toast"></div>

<script>
// ===== SPLASH SCREEN =====
setTimeout(()=>{document.getElementById('splash').classList.add('exit');setTimeout(()=>{document.getElementById('splash').style.display='none';document.getElementById('themeScreen').style.display='flex'},800)},2500);

// ===== PLAYER COUNT =====
(async function(){const pc=document.getElementById('playerCount');try{let counted=false;
try{const me=await window.storage.get('oraculum-counted');if(me&&me.value==='yes')counted=true}catch(e){}
let count=0;try{const r=await window.storage.get('oraculum-total-players',true);if(r&&r.value)count=parseInt(r.value)||0}catch(e){}
if(!counted){count++;await window.storage.set('oraculum-total-players',count.toString(),true);await window.storage.set('oraculum-counted','yes')}
pc.textContent='Players: '+count}catch(e){pc.textContent='Players: 1'}})();

// ===== BACKGROUNDS =====
const W=()=>innerWidth,H=()=>innerHeight;
const cv=document.getElementById('bgCanvas'),cx=cv.getContext('2d');
let bgAnim=null;
const BG={
  space:{stars:[],neb:[],
    init(){this.stars=[];this.neb=[];for(let i=0;i<200;i++)this.stars.push({x:Math.random()*W(),y:Math.random()*H(),r:Math.random()*1.4+.2,s:Math.random()*.2+.05,o:Math.random()*6});for(let i=0;i<5;i++)this.neb.push({x:Math.random()*W(),y:Math.random()*H(),r:80+Math.random()*120,h:240+Math.random()*60,a:.02+Math.random()*.02})},
    draw(f){cx.fillStyle='#060610';cx.fillRect(0,0,W(),H());this.neb.forEach(n=>{const g=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);g.addColorStop(0,`hsla(${n.h+f*.2},60%,30%,${n.a+.008*Math.sin(f*.008)})`);g.addColorStop(1,'transparent');cx.fillStyle=g;cx.fillRect(0,0,W(),H())});this.stars.forEach(s=>{s.o+=.003;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(180,170,240,${.1+.12*Math.sin(s.o)})`;cx.fill();s.y+=s.s;if(s.y>H()){s.y=0;s.x=Math.random()*W()}})}},
  ancient:{sparks:[],
    init(){this.sparks=[];for(let i=0;i<30;i++)this.sparks.push({x:Math.random()*W(),y:Math.random()*H(),s:Math.random()*1.5+.5,o:Math.random()*6,sp:.15+Math.random()*.3})},
    draw(f){cx.fillStyle='#1a150e';cx.fillRect(0,0,W(),H());const g=cx.createRadialGradient(W()*.5,H()*.4,0,W()*.5,H()*.4,W()*.6);g.addColorStop(0,'rgba(184,149,42,.03)');g.addColorStop(1,'transparent');cx.fillStyle=g;cx.fillRect(0,0,W(),H());for(let i=0;i<6;i++){const x=W()*(i/5);cx.fillStyle='rgba(139,69,19,.06)';cx.fillRect(x,H()*.35,16,H()*.65);const fl=3*Math.sin(f*.06+i);const g2=cx.createRadialGradient(x+8,H()*.35,0,x+8,H()*.35,28+fl);g2.addColorStop(0,'rgba(255,150,50,.06)');g2.addColorStop(1,'transparent');cx.fillStyle=g2;cx.fillRect(x-30,H()*.25,76,76)}this.sparks.forEach(s=>{s.o+=.02;s.y-=s.sp;if(s.y<0){s.y=H();s.x=Math.random()*W()}cx.beginPath();cx.arc(s.x,s.y,s.s,0,Math.PI*2);cx.fillStyle=`rgba(184,149,42,${.04+.04*Math.sin(s.o)})`;cx.fill()})}},
  love:{hearts:[],petals:[],
    init(){this.hearts=[];this.petals=[];for(let i=0;i<12;i++)this.hearts.push({x:Math.random()*W(),y:Math.random()*H(),sz:6+Math.random()*12,sp:.15+Math.random()*.25,o:Math.random()*6,dx:Math.sin(i)*.3});for(let i=0;i<22;i++)this.petals.push({x:Math.random()*W(),y:Math.random()*H(),sz:2+Math.random()*4,sp:.2+Math.random()*.3,rot:Math.random()*6,rsp:.01+Math.random()*.02,dr:Math.random()*.5-.25})},
    draw(f){cx.fillStyle='#1a0a14';cx.fillRect(0,0,W(),H());const g=cx.createRadialGradient(W()*.5,H()*.5,0,W()*.5,H()*.5,W()*.5);g.addColorStop(0,'rgba(200,80,120,.04)');g.addColorStop(1,'transparent');cx.fillStyle=g;cx.fillRect(0,0,W(),H());this.hearts.forEach(h=>{h.o+=.015;h.y-=h.sp;h.x+=h.dx+Math.sin(f*.01+h.o)*.3;if(h.y<-20){h.y=H()+20;h.x=Math.random()*W()}cx.save();cx.translate(h.x,h.y);cx.scale(h.sz/12,h.sz/12);cx.globalAlpha=.04+.03*Math.sin(h.o);cx.beginPath();cx.moveTo(0,-4);cx.bezierCurveTo(-6,-10,-12,0,0,8);cx.bezierCurveTo(12,0,6,-10,0,-4);cx.fillStyle='#e07090';cx.fill();cx.restore()});this.petals.forEach(p=>{p.y+=p.sp;p.x+=p.dr+Math.sin(f*.008+p.rot)*.4;p.rot+=p.rsp;if(p.y>H()+10){p.y=-10;p.x=Math.random()*W()}cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.globalAlpha=.06;cx.beginPath();cx.ellipse(0,0,p.sz,p.sz*.5,0,0,Math.PI*2);cx.fillStyle='#c06080';cx.fill();cx.restore()})}},
  nature:{leaves:[],birds:[],
    init(){this.leaves=[];this.birds=[];for(let i=0;i<18;i++)this.leaves.push({x:Math.random()*W(),y:Math.random()*H(),sz:2+Math.random()*3,sp:.2+Math.random()*.25,rot:Math.random()*6,rsp:.008+Math.random()*.015,dr:Math.random()*.4-.2});for(let i=0;i<4;i++)this.birds.push({x:Math.random()*W(),y:H()*.15+Math.random()*H()*.2,sp:.4+Math.random()*.3,w:Math.random()*6})},

}

function setClk(on){polys.forEach((p,i)=>{if(on){p.classList.add('clickable');labels[i].classList.add('clk')}else{p.classList.remove('clickable');p.onclick=null;labels[i].classList.remove('clk');labels[i].onclick=null}})}
function setFold(s){el('fold-overlay').className=s}
function bind(i,cb){const h=(e)=>{sfxSelect();haptic('light');cb(i)};polys[i].onclick=h;labels[i].onclick=h}
function burst(){const c=[TH.accent,'rgba(255,255,255,.1)'];for(let i=0;i<10;i++){const e=document.createElement('div');e.className='cf';const w=2+Math.random()*2,h=w*(1.5+Math.random());e.style.cssText=`width:${w}px;height:${h}px;left:${40+Math.random()*20}%;top:${30+Math.random()*10}%;background:${c[i%2]};border-radius:50%;--dur:${.7+Math.random()*.4}s;--dx:${(Math.random()-.5)*80}px;--dy:${80+Math.random()*100}px;--rot:${Math.random()*360}deg;animation-delay:${Math.random()*.08}s`;document.body.appendChild(e);setTimeout(()=>e.remove(),1400)}}
function toast(m){const t=el('toast');t.textContent=m;t.style.color=TH.text;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}

// ===== GAME FLOW =====
function startGame(){
  phase='SHUFFLE';selColor=null;noteIdx=0;selNum=0;selCat=null;currentFortune='';roundNum++;
  if(roundNum>1){el('streak').style.display='block';el('streak').textContent='Round '+roundNum}
  el('bP').classList.add('hidden');el('bS').classList.remove('hidden');
  el('f-scene').classList.remove('show');el('f-scene').style.display='none';el('rev-ov').style.display='none';
  el('letterDisp').textContent='';el('status').textContent=TH.m.s;
  el('ft-container').style.display='';el('ft-container').classList.remove('disappear');
  el('introOverlay').classList.add('hide');el('gameArea').style.display='flex';
  setFold('fc');setClk(false);initAudio();startMusic();
  let flip=false;shuffleInt=setInterval(()=>{if(phase!=='SHUFFLE')return;setFlaps(pick(TH.colors,4));flip=!flip;setFold(flip?'fh':'fv')},300);
}
function stopTheMusic(){
  phase='PICK_COLOR';haltMusic();clearInterval(shuffleInt);shuffleInt=null;haptic('medium');
  el('bS').classList.add('hidden');setFold('fc');el('status').textContent=TH.m.c;
  setClk(true);for(let i=0;i<4;i++)bind(i,pickColor);
}
function pickColor(i){if(phase!=='PICK_COLOR')return;phase='SPELLING';
  selColor={n:labels[i].textContent,h:polys[i].getAttribute('fill')};
  curColors=polys.map((p,j)=>({n:labels[j].textContent,h:p.getAttribute('fill')}));
  selColorName=selColor.n.toUpperCase();setClk(false);el('status').textContent=TH.m.sp+selColorName;doSpelling(selColorName)}
async function doSpelling(w){const nA=['I','II','III','IV'],nB=['V','VI','VII','VIII'];let isA=true,f,fN;
  for(let i=0;i<w.length;i++){el('letterDisp').textContent=w.substring(0,i+1).split('').join('  ');isA=!isA;f=isA?nA:nB;fN=isA?[1,2,3,4]:[5,6,7,8];
    setFold(isA?'fh':'fv');setFlaps(f.map((n,j)=>({bg:TH.nBg[j],label:n})),'15px');
    sfxSpell();haptic('light');await sleep(360)}
  phase='PICK_NUMBER';el('status').textContent=TH.m.n;el('letterDisp').textContent='';setClk(true);
  for(let i=0;i<4;i++){const num=fN[i];bind(i,()=>pickNumber(num))}}
function pickNumber(n){if(phase!=='PICK_NUMBER')return;phase='PICK_CAT';selNum=n;setClk(false);setFold('fc');el('status').textContent=TH.m.p;
  const cats=pick(TH.cats,4);setFlaps(cats.map((c,i)=>({bg:TH.cCol[TH.cats.indexOf(c)],label:c.s+' '+c.l})),'9px');
  setClk(true);for(let i=0;i<4;i++){const cat=cats[i];bind(i,()=>pickCat(cat))}}
async function pickCat(cat){if(phase!=='PICK_CAT')return;phase='REVEAL';selCat=cat;setClk(false);
  el('status').textContent='';el('letterDisp').textContent='';el('ft-container').classList.add('disappear');await sleep(420);el('ft-container').style.display='none';
  const ov=el('rev-ov');ov.style.display='flex';setTimeout(()=>ov.classList.add('show'),10);
  const c2=el('rev-cv'),c=c2.getContext('2d'),rt=el('rev-tx'),msgs=TH.rev;let mi=0;rt.textContent=msgs[0]+'...';
  const mI=setInterval(()=>{mi++;if(mi<msgs.length)rt.textContent=msgs[mi]+'...'},650);
  const sI=setInterval(()=>{if(audioCtx)playNote(120+Math.random()*200,.2,.01)},300);
  const hue=themeKey==='space'?260:themeKey==='love'?340:themeKey==='nature'?120:35;
  let ff=0;await new Promise(r=>{(function d(){c.clearRect(0,0,160,160);const x=80,y=80;
    for(let rr=0;rr<4;rr++){c.beginPath();c.arc(x,y,8+rr*12,ff*.012+rr*.5,ff*.012+rr*.5+Math.PI*1.3);c.strokeStyle=`hsla(${hue+rr*10+ff},30%,48%,${.035+.03*Math.sin(ff*.03+rr)})`;c.lineWidth=.8;c.stroke()}
    for(let i=0;i<5;i++){const a=ff*.015+i*Math.PI/2.5,dd=14+10*Math.sin(ff*.035+i);c.beginPath();c.arc(x+Math.cos(a)*dd,y+Math.sin(a)*dd,.8+Math.sin(ff*.05+i)*.5,0,Math.PI*2);c.fillStyle=`hsla(${hue+i*15+ff},35%,52%,${.08+.06*Math.sin(ff*.04+i)})`;c.fill()}
    ff++;ff<100?requestAnimationFrame(d):(clearInterval(mI),clearInterval(sI),rt.textContent='',r())})()});
  ov.classList.remove('show');await sleep(260);ov.style.display='none';showF(cat)}

async function showF(cat){
  const rm=toR(selNum),meta=selColor.n+' · '+rm+' · '+cat.l;
  el('fSy').textContent=cat.s;el('fSy').style.cssText=`color:${TH.accent};font-family:${TH.font};font-size:1.1em;letter-spacing:6px;opacity:.7;position:relative;margin-bottom:8px`;
  el('fCa').textContent=cat.l;el('fCa').style.cssText=`color:${TH.accent};font-family:${TH.font};font-size:.62em;letter-spacing:3px;text-transform:uppercase;opacity:.5;position:relative;margin-bottom:14px`;
  el('fQ').innerHTML='<div class="ld"><span></span><span></span><span></span></div>';
  el('fQ').querySelectorAll('span').forEach(s=>s.style.background=TH.accent);
  el('fQ').style.cssText=`font-family:${TH.bFont};color:${TH.text};font-size:1.1em;line-height:1.85;font-weight:500;font-style:italic;position:relative;max-width:310px;margin:0 auto;word-wrap:break-word`;
  el('fM').textContent=meta;el('fM').style.cssText=`font-family:${TH.font};color:${TH.text};opacity:.35;font-size:.56em;letter-spacing:2px;text-transform:uppercase;position:relative`;
  el('fSr').textContent='';el('fA').style.display='none';
  el('gameArea').style.display='none';
  el('f-scene').style.display='flex';requestAnimationFrame(()=>el('f-scene').classList.add('show'));
  burst();sfxReveal();haptic('success');
  try{const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
    messages:[{role:"user",content:`You are the Oraculum from the "${TH.name}" realm. ONE fortune.
Realm: ${TH.name} | Category: ${cat.l} (${cat.id}) | Color: ${selColor.n} | Number: ${selNum} (${rm}) | Round: ${roundNum}
Tone: ${TH.tone}
Category "${cat.l}" — be creative in the ${TH.name} context.
Rules: 1-2 sentences ONLY. Match realm tone PERFECTLY. Weave in "${selColor.n}" or ${rm} naturally. Original, vivid. Output ONLY the fortune.`}]})});
    const data=await resp.json();currentFortune=data.content?.[0]?.text||fb(cat)}catch(e){currentFortune=fb(cat)}
  el('fQ').textContent=currentFortune;
  el('fQ').style.cssText=`font-family:${TH.bFont};color:${TH.text};font-size:1.1em;line-height:1.85;font-weight:500;font-style:italic;position:relative;max-width:310px;margin:0 auto;word-wrap:break-word`;
  el('fSr').textContent=TH.src;el('fSr').style.cssText=`font-family:${TH.bFont};color:${TH.text};opacity:.4;font-size:.62em;margin-top:6px;font-style:italic;position:relative`;
  el('fA').style.display='flex';
  // Style share button visibly
  const shareBtn=document.getElementById('bShare');
  shareBtn.style.cssText=`padding:8px 16px;border:1px solid ${TH.accent};border-radius:6px;background:transparent;font-size:.62em;font-weight:600;cursor:pointer;letter-spacing:1.2px;text-transform:uppercase;font-family:${TH.font};color:${TH.accent}`;
}

const FBP=["{color} carries a message only you can decode — {num} moments from now, you'll understand.",
"The universe shaped {num} stars in your name's pattern, each glowing {color}.",
"A {color} thread connects you to something extraordinary, {num} heartbeats away.",
"Where {color} meets silence, your {num} greatest truths are waiting.",
"The {num}th time you notice {color} today, pause — the universe wants your attention.",
"{num} doors stand before you, but only the {color} one leads somewhere unimaginable.",
"Something {color} will remind you of a promise made {num} lifetimes ago.",
"When you see {color}, count to {num} — what you think of is your answer.",
"A {color} moment is approaching, taking {num} seconds to change everything.",
"In the silence between {num} breaths, a {color} truth has been waiting all along."];
function fb(cat){const ci=TH.colors.findIndex(c=>c.n===selColor.n)||0;
  return FBP[(ci*8+selNum*13+roundNum*7+(cat.l||'').length*3)%FBP.length].replace(/\{color\}/g,selColor.n).replace(/\{num\}/g,toR(selNum))}
function shareFortune(){const t=currentFortune+'\n\n— Oraculum · '+TH.name+' ('+selColor.n+' · '+toR(selNum)+' · '+selCat.l+')';
  try{const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-9999px;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.select();const ok=document.execCommand('copy');document.body.removeChild(ta);toast(ok?'Copied':'Failed')}catch(e){toast('Failed')}}

function shareAsImage(){
  const c=document.createElement('canvas');
  c.width=1080;c.height=1920;
  const x=c.getContext('2d');
  const accent=TH.accent;const text=TH.text;

  const bgColors={space:['#08061a','#12103a','#08061a'],ancient:['#1a150e','#2a2018','#1a150e'],love:['#1a0a14','#2a1020','#1a0a14'],nature:['#0a140a','#142014','#0a140a']};
  const bg=bgColors[themeKey]||bgColors.space;
  const grd=x.createLinearGradient(0,0,0,1920);
  grd.addColorStop(0,bg[0]);grd.addColorStop(.5,bg[1]);grd.addColorStop(1,bg[2]);
  x.fillStyle=grd;x.fillRect(0,0,1080,1920);

  for(let i=0;i<8;i++){x.beginPath();x.arc(540,960,150+i*80,0,Math.PI*2);x.strokeStyle=accent+'08';x.lineWidth=1;x.stroke()}

  const drawCorner=(ox,oy,sx,sy)=>{x.save();x.translate(ox,oy);x.scale(sx,sy);x.strokeStyle=accent+'25';x.lineWidth=2;
    x.beginPath();x.moveTo(0,60);x.lineTo(0,0);x.lineTo(60,0);x.stroke();
    x.beginPath();x.moveTo(0,45);x.lineTo(0,0);x.lineTo(45,0);x.stroke();x.restore()};
  drawCorner(60,60,1,1);drawCorner(1020,60,-1,1);drawCorner(60,1860,1,-1);drawCorner(1020,1860,-1,-1);

  x.fillStyle=accent+'30';x.fillRect(440,180,200,2);
  x.font='700 42px serif';x.fillStyle=accent;x.textAlign='center';x.fillText('ORACULUM',540,260);
  x.font='400 22px serif';x.fillStyle=text+'80';x.fillText(TH.name,540,300);
  x.fillStyle=accent+'20';x.fillRect(460,340,160,1);
  x.font='48px serif';x.fillStyle=accent+'90';x.fillText(selCat.s,540,440);
  x.font='600 24px serif';x.fillStyle=accent+'70';x.fillText(selCat.l.toUpperCase(),540,490);

  x.font='italic 36px serif';x.fillStyle=text;
  const words=currentFortune.split(' ');let lines=[],line='';
  words.forEach(w=>{const test=line+(line?' ':'')+w;if(x.measureText(test).width>820){lines.push(line);line=w}else{line=test}});
  if(line)lines.push(line);
  const lineH=52,blockH=lines.length*lineH,startY=960-blockH/2+20;

  x.font='italic 120px serif';x.fillStyle=accent+'15';
  x.fillText('\u201C',160,startY-10);x.fillText('\u201D',920,startY+blockH+40);
  x.font='italic 36px serif';x.fillStyle=text+'e0';
  lines.forEach((l,i)=>x.fillText(l,540,startY+i*lineH));

  x.fillStyle=accent+'20';x.fillRect(480,startY+blockH+50,120,1);
  x.font='600 18px serif';x.fillStyle=text+'40';
  x.fillText(selColor.n+' \u00B7 '+toR(selNum)+' \u00B7 '+selCat.l,540,startY+blockH+100);
  x.beginPath();x.arc(540,startY+blockH+150,12,0,Math.PI*2);x.fillStyle=selColor.h;x.fill();
  x.font='italic 18px serif';x.fillStyle=text+'30';x.fillText(TH.src,540,startY+blockH+200);

  x.fillStyle=accent+'15';x.fillRect(440,1720,200,1);
  x.font='600 16px serif';x.fillStyle=accent+'40';x.fillText('ORACULUM',540,1760);
  x.font='400 13px serif';x.fillStyle=text+'25';x.fillText('Unfold the whispers of fate',540,1785);

  // Convert canvas to blob and share natively
  c.toBlob(async(blob)=>{
    if(!blob){toast('Failed to create image');return}
    const file=new File([blob],'oraculum-fortune.png',{type:'image/png'});

    // Try native share (works on mobile — WhatsApp, Instagram, etc.)
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{
        await navigator.share({
          title:'My Oraculum Fortune',
          text:currentFortune+' — Oraculum',
          files:[file]
        });
        toast('Shared!');
      }catch(e){
        if(e.name!=='AbortError')downloadFallback(blob);
      }
    }else{
      // Desktop or unsupported — download instead
      downloadFallback(blob);
    }
  },'image/png');
}

function downloadFallback(blob){
  const url=URL.createObjectURL(blob);
  // Show preview overlay so user can right-click save or download
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)';
  const img=document.createElement('img');
  img.src=url;img.style.cssText='max-height:70vh;max-width:90%;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.4)';
  const btns=document.createElement('div');
  btns.style.cssText='display:flex;gap:10px;margin-top:16px;align-items:center';

  const dlBtn=document.createElement('button');
  dlBtn.textContent='Download';
  dlBtn.style.cssText='padding:10px 24px;border:none;border-radius:8px;background:'+TH.accent+';color:'+TH.btnText+';font-family:'+TH.font+';font-size:14px;font-weight:600;cursor:pointer;letter-spacing:1px;text-transform:uppercase';
  dlBtn.onclick=()=>{const a=document.createElement('a');a.href=url;a.download='oraculum-fortune.png';a.click();toast('Image downloaded!')};

  const copyBtn=document.createElement('button');
  copyBtn.textContent='Copy Image';
  copyBtn.style.cssText='padding:10px 24px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.06);color:#fff;font-family:'+TH.font+';font-size:14px;font-weight:600;cursor:pointer;letter-spacing:1px;text-transform:uppercase';
  copyBtn.onclick=async()=>{try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);toast('Image copied — paste anywhere!')}catch(e){toast('Use Download instead')}};

  const closeBtn=document.createElement('button');
  closeBtn.textContent='Close';
  closeBtn.style.cssText='padding:10px 24px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:transparent;color:rgba(255,255,255,.5);font-family:'+TH.font+';font-size:14px;font-weight:600;cursor:pointer;letter-spacing:1px;text-transform:uppercase';
  closeBtn.onclick=()=>{overlay.remove();URL.revokeObjectURL(url)};

  const hint=document.createElement('div');
  hint.textContent='Right-click the image to save or copy';
  hint.style.cssText='margin-top:10px;font-size:12px;color:rgba(255,255,255,.25);font-style:italic';

  btns.appendChild(dlBtn);btns.appendChild(copyBtn);btns.appendChild(closeBtn);
  overlay.appendChild(img);overlay.appendChild(btns);overlay.appendChild(hint);
  overlay.addEventListener('click',(e)=>{if(e.target===overlay){overlay.remove();URL.revokeObjectURL(url)}});
  document.body.appendChild(overlay);
}
function playAgain(){el('f-scene').classList.remove('show');setTimeout(()=>{el('f-scene').style.display='none';el('gameArea').style.display='flex';startGame()},400)}
</script>
